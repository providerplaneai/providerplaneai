name: Deploy TypeDoc to S3 + CloudFront

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy-docs:
    runs-on: ubuntu-latest
    env:
      # Required by ConfigLoader during docs generation in this repo.
      OPENAI_API_KEY_1: ci-dummy-openai-key-1
      OPENAI_API_KEY_2: ci-dummy-openai-key-2
      ANTHROPIC_API_KEY_1: ci-dummy-anthropic-key-1
      VOYAGE_API_KEY: ci-dummy-voyage-key-1
      GEMINI_API_KEY_1: ci-dummy-gemini-key-1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci
        env:
          HUSKY: 0

      - name: Build TypeDoc
        run: npm run docs

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DOCS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Upload docs to S3
        run: aws s3 sync docs/ s3://${{ vars.AWS_DOCS_BUCKET }}/ --delete

      - name: Invalidate CloudFront cache
        if: ${{ vars.AWS_CLOUDFRONT_DISTRIBUTION_ID != '' }}
        run: aws cloudfront create-invalidation --distribution-id ${{ vars.AWS_CLOUDFRONT_DISTRIBUTION_ID }} --paths "/*"
