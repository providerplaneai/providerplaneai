# This workflow will run tests using node and then publish a package to GitHub Packages when a release is created
# For more information see: https://docs.github.com/en/actions/publishing-packages/publishing-nodejs-packages

name: npm publish

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      # Required by ConfigLoader during tests/build; dummy values are enough
      # for unit tests that mock provider SDK calls.
      OPENAI_API_KEY_1: ci-dummy-openai-key-1
      OPENAI_API_KEY_2: ci-dummy-openai-key-2
      ANTHROPIC_API_KEY_1: ci-dummy-anthropic-key-1
      VOYAGE_API_KEY: ci-dummy-voyage-key-1
      GEMINI_API_KEY_1: ci-dummy-gemini-key-1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"
          cache: npm

      - name: Install
        run: npm ci
        env:
          HUSKY: 0

      - name: Build
        run: npm run build

      - name: Publish to npm (Trusted Publishing)
        run: npm publish --provenance --access public
