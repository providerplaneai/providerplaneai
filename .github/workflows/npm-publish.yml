# This workflow will run tests using node and then publish a package to npm when a release tag is created.

name: npm publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      dispatch_only:
        description: "Skip npm publish and only trigger the providerplane-web release workflow"
        required: false
        default: true
        type: boolean
      release_tag:
        description: "Release tag to send in the repository_dispatch payload when testing manually"
        required: false
        default: "manual-test"
        type: string

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      # Required by ConfigLoader during tests/build; dummy values are enough
      # for unit tests that mock provider SDK calls.
      OPENAI_API_KEY_1: ci-dummy-openai-key-1
      OPENAI_API_KEY_2: ci-dummy-openai-key-2
      ANTHROPIC_API_KEY_1: ci-dummy-anthropic-key-1
      VOYAGE_API_KEY: ci-dummy-voyage-key-1
      GEMINI_API_KEY_1: ci-dummy-gemini-key-1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"
          cache: npm

      - name: Install
        run: npm ci
        env:
          HUSKY: 0

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test
        run: npm run test

      - name: Generate docs
        run: npm run docs

      - name: Publish to npm
        if: ${{ github.event_name != 'workflow_dispatch' || !inputs.dispatch_only }}
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Trigger providerplane-web .dev build
        env:
          DISPATCH_TOKEN: ${{ secrets.PROVIDERPLANE_WEB_DISPATCH_TOKEN }}
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
          LIBRARY_REF: ${{ github.ref_name }}
        run: |
          python3 - <<'PY2'
          import json
          import os
          from pathlib import Path
          from urllib.request import Request, urlopen

          token = os.environ.get("DISPATCH_TOKEN", "")
          if not token:
              raise SystemExit("Missing PROVIDERPLANE_WEB_DISPATCH_TOKEN secret")

          changelog = Path("CHANGELOG.md").read_text()
          body = json.dumps({
              "event_type": "providerplane_release",
              "client_payload": {
                  "tag": os.environ.get("RELEASE_TAG", ""),
                  "library_ref": os.environ.get("LIBRARY_REF", ""),
                  "changelog": changelog
              }
          }).encode("utf-8")

          req = Request(
              "https://api.github.com/repos/providerplaneai/providerplane-web/dispatches",
              data=body,
              headers={
                  "Accept": "application/vnd.github+json",
                  "Authorization": f"Bearer {token}",
                  "X-GitHub-Api-Version": "2022-11-28"
              },
              method="POST"
          )

          with urlopen(req) as resp:
              print(f"repository_dispatch status={resp.status}")
          PY2
