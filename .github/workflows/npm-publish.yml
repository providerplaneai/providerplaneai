# This workflow will run tests using node and then publish a package to GitHub Packages when a release is created
# For more information see: https://docs.github.com/en/actions/publishing-packages/publishing-nodejs-packages

name: npm publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"
          cache: npm

      - name: Install
        run: npm ci
        env:
          HUSKY: 0

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test
        run: npm run test

      - name: Publish to npm (Trusted Publishing)
        run: npm publish --provenance --access public

      - name: Trigger providerplane-web .dev build
        env:
          DISPATCH_TOKEN: ${{ secrets.PROVIDERPLANE_WEB_DISPATCH_TOKEN }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          python3 - <<'PY2'
          import json
          import os
          from pathlib import Path
          from urllib.request import Request, urlopen

          token = os.environ.get("DISPATCH_TOKEN", "")
          if not token:
              raise SystemExit("Missing PROVIDERPLANE_WEB_DISPATCH_TOKEN secret")

          changelog = Path("CHANGELOG.md").read_text()
          body = json.dumps({
              "event_type": "providerplane_release",
              "client_payload": {
                  "tag": os.environ.get("RELEASE_TAG", ""),
                  "changelog": changelog
              }
          }).encode("utf-8")

          req = Request(
              "https://api.github.com/repos/providerplaneai/providerplane-web/dispatches",
              data=body,
              headers={
                  "Accept": "application/vnd.github+json",
                  "Authorization": f"Bearer {token}",
                  "X-GitHub-Api-Version": "2022-11-28"
              },
              method="POST"
          )

          with urlopen(req) as resp:
              print(f"repository_dispatch status={resp.status}")
          PY2

