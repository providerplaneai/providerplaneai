# This workflow will do a clean installation of node dependencies, cache/restore them, build the source code and run tests across different versions of node
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-nodejs

name: Node.js CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-test:
    runs-on: ubuntu-latest
    env:
      # Required by ConfigLoader during tests/build; dummy values are enough
      # for unit tests that mock provider SDK calls.
      OPENAI_API_KEY_1: ci-dummy-openai-key-1
      OPENAI_API_KEY_2: ci-dummy-openai-key-2
      ANTHROPIC_API_KEY_1: ci-dummy-anthropic-key-1
      VOYAGE_API_KEY: ci-dummy-voyage-key-1
      GEMINI_API_KEY_1: ci-dummy-gemini-key-1
      MISTRAL_API_KEY_1: ci-dummy-mistral-key-1

    strategy:
      fail-fast: false
      matrix:
        node-version: [20.x, 22.x, 24.x]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install
        run: npm ci
        env:
          HUSKY: 0

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test
        run: npm run test

