name: Perf CI

on:
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  perf:
    name: Perf Gate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      # Required by ConfigLoader during perf run initialization.
      OPENAI_API_KEY_1: ci-dummy-openai-key-1
      OPENAI_API_KEY_2: ci-dummy-openai-key-2
      ANTHROPIC_API_KEY_1: ci-dummy-anthropic-key-1
      VOYAGE_API_KEY: ci-dummy-voyage-key-1
      GEMINI_API_KEY_1: ci-dummy-gemini-key-1
      MISTRAL_API_KEY_1: ci-dummy-mistral-key-1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci
        env:
          HUSKY: 0

      - name: Run perf gate
        run: npm run perf:ci

      - name: Upload perf artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: perf-results
          path: scripts/perf/results/latest.*

