name: PR Title Check

on:
  pull_request_target:
    types: [opened, edited, reopened, synchronize]

permissions:
  contents: read
  pull-requests: read

jobs:
  validate-pr-title:
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR title format
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          echo "PR title: $PR_TITLE"

          pattern='^(feat|fix|docs|refactor|test|chore|perf)\([^)]+\): .+( \(#([0-9]+)\))?$'
          if [[ ! "$PR_TITLE" =~ $pattern ]]; then
            echo "PR title does not match the required format."
            echo "Expected: type(scope): short summary"
            echo "Optional issue reference: type(scope): short summary (#123)"
            echo "Examples:"
            echo "  feat(workflow): add persistence resume example"
            echo "  fix(client): prevent duplicate provider registration (#121)"
            exit 1
          fi
